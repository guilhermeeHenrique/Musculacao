<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Fase 4 — Treino</title><style>
:root{--bg:#07111f;--card:#101b2e;--line:rgba(255,255,255,.12);--text:#f8fafc;--muted:#a9b6c9;--green:#32f3b2;--blue:#60a5fa;--red:#fb7185;--orange:#fb923c}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,rgba(96,165,250,.25),transparent 35%),radial-gradient(circle at 100% 0,rgba(50,243,178,.18),transparent 33%),linear-gradient(180deg,#07111f,#0b1220);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}header{position:sticky;top:0;z-index:10;background:rgba(7,17,31,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.wrap{max-width:1160px;margin:auto;padding:14px 14px 86px}h1{font-size:clamp(25px,6vw,44px);line-height:1;margin:2px 0 8px;letter-spacing:-.04em}.sub{margin:0;color:var(--muted);font-size:14px}.row,.tabs{display:flex;gap:8px;overflow-x:auto;padding:11px 0 3px}.btn,.tab{border:1px solid var(--line);background:rgba(23,38,65,.92);color:var(--text);border-radius:14px;padding:10px 12px;font-size:13px;font-weight:800;white-space:nowrap;cursor:pointer}.tab.active,.btn.green{background:linear-gradient(135deg,var(--green),#5eead4);color:#04231a;border:0}.btn.red{border-color:rgba(251,113,133,.45);color:#fecdd3}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}@media(min-width:760px){.metrics{grid-template-columns:repeat(4,1fr)}}.metric{background:rgba(16,27,46,.9);border:1px solid var(--line);border-radius:18px;padding:12px}.metric span{display:block;color:var(--muted);font-size:12px;font-weight:700}.metric b{display:block;font-size:21px;margin-top:4px}.week{display:none}.week.active{display:block}.week-title{font-size:22px;margin:14px 0 8px}.note{background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25);color:#fde68a;border-radius:16px;padding:12px;font-size:14px;margin:10px 0}.grid{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}.day{background:rgba(16,27,46,.94);border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 18px 45px rgba(0,0,0,.25)}.day.done{border-color:rgba(50,243,178,.65);box-shadow:0 0 0 2px rgba(50,243,178,.08)}.daytop{background:linear-gradient(135deg,rgba(96,165,250,.18),rgba(50,243,178,.08));border-bottom:1px solid var(--line);padding:14px}.kicker{color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:900}.daytitle{font-size:18px;font-weight:950;margin:4px 0 0;display:flex;justify-content:space-between;gap:10px}.badge{font-size:11px;background:rgba(50,243,178,.14);color:var(--green);border:1px solid rgba(50,243,178,.24);border-radius:999px;padding:6px 8px;white-space:nowrap}.daynote{color:var(--muted);font-size:13px;margin:7px 0 0}.done-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-weight:800;font-size:13px}.done-row input{width:22px;height:22px;accent-color:var(--green)}details{border-bottom:1px solid var(--line)}details:last-child{border-bottom:0}summary{list-style:none;cursor:pointer;display:grid;grid-template-columns:78px 1fr auto;gap:10px;align-items:center;padding:12px}summary::-webkit-details-marker{display:none}.visual{height:72px;border-radius:18px;background:linear-gradient(135deg,var(--blue),#a78bfa);display:flex;align-items:center;justify-content:center;position:relative;text-decoration:none;overflow:hidden}.visual svg{width:58px;height:58px;filter:drop-shadow(0 8px 10px rgba(0,0,0,.3))}.tiny{position:absolute;bottom:5px;left:6px;right:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(0,0,0,.36);border-radius:999px;padding:2px 5px;color:#fff;font-size:9px;font-weight:900;text-align:center}.exname{font-size:14px;font-weight:950;line-height:1.15}.last{display:inline-block;margin-bottom:4px;color:#c4b5fd;background:rgba(167,139,250,.13);border:1px solid rgba(167,139,250,.3);border-radius:999px;padding:3px 7px;font-size:10px;font-weight:900}.meta{color:var(--muted);font-size:12px;margin-top:4px}.status{min-width:76px;text-align:center;border:1px solid var(--line);border-radius:999px;padding:6px 7px;color:var(--muted);font-size:11px;font-weight:900}.status.up{color:#d1fae5;background:rgba(50,243,178,.13);border-color:rgba(50,243,178,.5)}.status.down{color:#ffe4e6;background:rgba(251,113,133,.13);border-color:rgba(251,113,133,.5)}.status.stable{color:#dbeafe;background:rgba(96,165,250,.13);border-color:rgba(96,165,250,.45)}.body{padding:0 12px 14px}.info{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 8px}.infobox{background:#07111f;border:1px solid var(--line);border-radius:14px;padding:8px}.infobox span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:900}.infobox b{font-size:12px}.cue{font-size:13px;color:#dbeafe;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.18);border-radius:14px;padding:10px}.setgrid{display:grid;grid-template-columns:38px repeat(3,1fr) 54px;gap:7px;align-items:end;margin-top:8px}.head{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:900}.setn{color:var(--muted);font-size:12px;font-weight:900;padding-bottom:10px}input,textarea{width:100%;background:#06101d;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px 8px;font-size:16px;outline:none}input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(96,165,250,.13)}input[type=checkbox]{width:23px;height:23px;accent-color:var(--green)}textarea{min-height:44px;resize:vertical;margin-top:8px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.linkbtn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;border:1px solid var(--line);background:rgba(23,38,65,.94);color:var(--text);border-radius:13px;padding:9px 10px;font-size:12px;font-weight:900}.video{background:rgba(251,146,60,.16);border-color:rgba(251,146,60,.35);color:#fed7aa}.footer{color:var(--muted);font-size:12px;line-height:1.5;margin-top:18px}.float{position:fixed;left:0;right:0;bottom:0;background:rgba(7,17,31,.9);backdrop-filter:blur(15px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:20}.float .btn{flex:1}</style></head><body><header><div class="wrap" style="padding-bottom:8px"><h1>Fase 4 — Treino + Cargas</h1><p class="sub">Salva automaticamente e mostra, em cada exercício, a última carga registrada.</p><div class="row"><button class="btn green" onclick="scrollToActive()">Semana ativa</button><button class="btn" onclick="exportData()">Exportar</button><label class="btn" for="file">Importar</label><input id="file" type="file" accept="application/json" style="display:none" onchange="importData(event)"><button class="btn red" onclick="resetAll()">Apagar</button></div></div></header><div class="wrap"><section class="metrics"><div class="metric"><span>Progresso</span><b id="mProg">0%</b></div><div class="metric"><span>Exercícios OK</span><b id="mDone">0/0</b></div><div class="metric"><span>Alertas queda</span><b id="mDrop">0</b></div><div class="metric"><span>Último save</span><b id="mSave">—</b></div></section><nav class="tabs" id="tabs"></nav><main id="weeks"></main><p class="footer"><b>Importante:</b> os dados ficam no navegador/celular via localStorage. Fechar o app ou recarregar mantém as cargas. Use exportar como backup.</p></div><nav class="float"><button class="btn" onclick="prevWeek()">←</button><button class="btn green" onclick="markFirstOpenDay()">Marcar dia</button><button class="btn" onclick="nextWeek()">→</button></nav><script>

const KEY="fase4_training_log_lastkg_v3";let log=load(),current=APP.weeks[0].id;function load(){try{return JSON.parse(localStorage.getItem(KEY))||{entries:{},days:{},savedAt:null}}catch(e){return{entries:{},days:{},savedAt:null}}}function save(){log.savedAt=new Date().toLocaleString("pt-BR");localStorage.setItem(KEY,JSON.stringify(log));metrics()}function ek(w,d,id){return `${w}__d${d}__${id}`}function dk(w,d){return `${w}__d${d}`}function $(s){return document.querySelector(s)}function $$(s){return Array.from(document.querySelectorAll(s))}function icon(){return `<svg viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="38" fill="white" opacity=".18"/><path d="M24 56c5-16 13-24 24-24s19 8 24 24" stroke="white" stroke-width="6" stroke-linecap="round"/><path d="M24 39h-8M80 39h-8M16 31v16M80 31v16" stroke="white" stroke-width="5" stroke-linecap="round"/><circle cx="48" cy="24" r="7" fill="white"/><path d="M37 65h22M41 75h14" stroke="white" stroke-width="5" stroke-linecap="round"/></svg>`}function render(){tabs();weeks();setWeek(current);metrics();statuses()}function tabs(){$("#tabs").innerHTML=APP.weeks.map(w=>`<button class="tab" data-w="${w.id}" onclick="setWeek('${w.id}')">${w.title}<br><span style="font-size:11px;opacity:.72">${w.date}</span></button>`).join("")}function weeks(){$("#weeks").innerHTML=APP.weeks.map(w=>`<section class="week" id="${w.id}"><h2 class="week-title">${w.title} · ${w.date}</h2><div class="note">Última carga aparece pequena acima do nome do exercício. A comparação usa a última vez registrada do mesmo exercício.</div><div class="grid">${w.days.map((d,i)=>day(w.id,d,i)).join("")}</div></section>`).join("")}function day(wid,d,i){let done=log.days[dk(wid,i)]?"done":"";return `<article class="day ${done}"><div class="daytop"><div class="kicker">${d[0]}</div><div class="daytitle"><span>${d[1]}</span><span class="badge">${d[3]=="workout"?"55 min":d[3]=="cardio"?"Cardio":"Off"}</span></div><p class="daynote">${d[2]}</p><p class="daynote"><b>Nota:</b> ${d[5]}</p><div class="done-row"><input type="checkbox" ${log.days[dk(wid,i)]?"checked":""} onchange="toggleDay('${wid}',${i},this.checked)"><span>Dia concluído</span></div></div>${d[4].length?d[4].map(id=>exBlock(wid,i,id)).join(""):`<div style="padding:14px;color:var(--muted)">Recuperação. Sem musculação.</div>`}</article>`}function exBlock(wid,di,id){let e=APP.exercises[id],k=ek(wid,di,id),entry=log.entries[k]||{sets:[]},last=lastWeight(k,id);let rows="";for(let i=0;i<Number(e[3]);i++){let s=(entry.sets||[])[i]||{};rows+=`<div class="setgrid"><div class="setn">S${i+1}</div><input type="number" inputmode="decimal" step="0.5" placeholder="kg" value="${s.weight??""}" onchange="setSet('${k}',${i},'weight',this.value)"><input type="number" inputmode="numeric" step="1" placeholder="reps" value="${s.reps??""}" onchange="setSet('${k}',${i},'reps',this.value)"><input type="number" inputmode="numeric" step="1" placeholder="RIR" value="${s.rir??""}" onchange="setSet('${k}',${i},'rir',this.value)"><input type="checkbox" ${s.done?"checked":""} onchange="setSet('${k}',${i},'done',this.checked)"></div>`}return `<details data-k="${k}" data-id="${id}"><summary><a class="visual" href="${e[8]}" target="_blank">${icon()}<span class="tiny">${e[2].split("/")[0]}</span></a><div>${last?`<span class="last">última vez: ${last} kg</span>`:"<span class='last'>sem carga anterior</span>"}<div class="exname">${e[0]}</div><div class="meta">${e[1]} · ${e[2]}</div></div><div class="status" id="st_${safe(k)}">sem dado</div></summary><div class="body"><div class="info"><div class="infobox"><span>Séries x reps</span><b>${e[3]} x ${e[4]}</b></div><div class="infobox"><span>RIR alvo</span><b>${e[5]}</b></div><div class="infobox"><span>Descanso</span><b>${e[6]}</b></div></div><div class="cue"><b>Como fazer:</b> ${e[7]}</div><div class="setgrid head"><div></div><div>Peso</div><div>Reps</div><div>RIR</div><div>OK</div></div>${rows}<textarea placeholder="Notas: ajuste da máquina, dor, sensação..." onchange="note('${k}',this.value)">${entry.note||""}</textarea><div class="actions"><a class="linkbtn video" target="_blank" href="${e[8]}">▶️ Vídeo YouTube</a><a class="linkbtn" target="_blank" href="${e[8]}">🖼️ Ver máquina</a><button class="btn" onclick="copyPrev('${k}','${id}')">Copiar última carga</button><button class="btn green" onclick="doneEx('${k}',${e[3]})">Concluir exercício</button></div></div></details>`}function setWeek(id){current=id;$$('.week').forEach(x=>x.classList.toggle('active',x.id==id));$$('.tab').forEach(x=>x.classList.toggle('active',x.dataset.w==id));metrics()}function safe(s){return s.replace(/[^a-zA-Z0-9_-]/g,"_")}function setSet(k,i,f,v){if(!log.entries[k])log.entries[k]={sets:[]};if(!log.entries[k].sets[i])log.entries[k].sets[i]={};log.entries[k].sets[i][f]=v;save();statuses();render()}function note(k,v){if(!log.entries[k])log.entries[k]={sets:[]};log.entries[k].note=v;save()}function top(entry){let vals=(entry?.sets||[]).map(s=>parseFloat(s.weight)).filter(v=>!isNaN(v));return vals.length?Math.max(...vals):null}function allOcc(){let arr=[];APP.weeks.forEach(w=>w.days.forEach((d,di)=>(d[4]||[]).forEach(id=>arr.push({wid:w.id,di,id,k:ek(w.id,di,id)}))));return arr}function lastWeight(k,id){let arr=allOcc(),idx=arr.findIndex(x=>x.k==k);let prev=arr.slice(0,idx).reverse().find(x=>x.id==id&&top(log.entries[x.k])!==null);return prev?top(log.entries[prev.k]):null}function statuses(){let drops=0,arr=allOcc();arr.forEach((o,idx)=>{let el=$("#st_"+safe(o.k));if(!el)return;let cur=top(log.entries[o.k]);if(cur===null){el.textContent="sem dado";el.className="status";return}let prev=arr.slice(0,idx).reverse().find(x=>x.id==o.id&&top(log.entries[x.k])!==null);if(!prev){el.textContent="base";el.className="status stable";return}let p=top(log.entries[prev.k]),diff=cur-p,pct=diff/p*100;if(pct>2){el.textContent="↑ "+diff.toFixed(1)+"kg";el.className="status up"}else if(pct<-5){el.textContent="↓ "+Math.abs(diff).toFixed(1)+"kg";el.className="status down";drops++}else{el.textContent="estável";el.className="status stable"}});$("#mDrop").textContent=drops}function toggleDay(w,i,c){log.days[dk(w,i)]=c;save();render()}function doneEx(k,n){if(!log.entries[k])log.entries[k]={sets:[]};for(let i=0;i<n;i++){if(!log.entries[k].sets[i])log.entries[k].sets[i]={};log.entries[k].sets[i].done=true}save();render()}function copyPrev(k,id){let arr=allOcc(),idx=arr.findIndex(x=>x.k==k);let prev=arr.slice(0,idx).reverse().find(x=>x.id==id&&log.entries[x.k]);if(!prev){alert("Sem registro anterior.");return}log.entries[k]=JSON.parse(JSON.stringify(log.entries[prev.k]));save();render()}function metrics(){let w=APP.weeks.find(x=>x.id==current),total=0,done=0;w.days.forEach((d,di)=>{(d[4]||[]).forEach(id=>{total++;let e=log.entries[ek(w.id,di,id)];if(e&&(e.sets||[]).some(s=>s.done))done++})});$("#mProg").textContent=(total?Math.round(done/total*100):0)+"%";$("#mDone").textContent=done+"/"+total;$("#mSave").textContent=log.savedAt||"—";statuses()}function markFirstOpenDay(){let w=APP.weeks.find(x=>x.id==current);for(let i=0;i<w.days.length;i++){let key=dk(w.id,i);if(!log.days[key]){log.days[key]=true;break}}save();render()}function scrollToActive(){$('.week.active')?.scrollIntoView({behavior:'smooth'})}function prevWeek(){let i=Math.max(0,APP.weeks.findIndex(w=>w.id==current)-1);setWeek(APP.weeks[i].id);scrollToActive()}function nextWeek(){let i=Math.min(APP.weeks.length-1,APP.weeks.findIndex(w=>w.id==current)+1);setWeek(APP.weeks[i].id);scrollToActive()}function exportData(){let b=new Blob([JSON.stringify(log,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='fase4_registros.json';a.click();URL.revokeObjectURL(u)}function importData(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{log=JSON.parse(r.result);save();render();alert('Importado.')}catch(e){alert('Arquivo inválido.')}};r.readAsText(f)}function resetAll(){if(confirm('Apagar todos os registros?')){log={entries:{},days:{},savedAt:null};save();render()}}render();</script></body></html>
